<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gita Phone</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>
<body>

<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <span class="navbar-brand">Gita Phone</span>

        <button id="darkModeBtn" class="btn btn-light">
            Dark Mode
        </button>
    </div>
</nav>

<div class="container py-4">

        <section class="banner-full">
        <img src="image/banner.png" alt="Banner Gita Phone">
    </section>

</div>

    <h1 class="mb-4">Listing Handphone</h1>

    <div class="row g-2 mb-4">

        <div class="col-md-4">
            <input
                type="text"
                id="search"
                class="form-control"
                placeholder="Cari handphone..."
            >
        </div>

        <div class="col-md-3">
            <select id="brandFilter" class="form-select">
                <option value="">Semua Merek</option>
                <option>Apple</option>
                <option>Samsung</option>
                <option>Xiaomi</option>
                <option>Asus</option>
                <option>Nubia</option>
            </select>
        </div>

        <div class="col-md-3">
            <select id="sortPrice" class="form-select">
                <option value="">Urutkan Harga</option>
                <option value="asc">Termurah</option>
                <option value="desc">Termahal</option>
            </select>
        </div>

        <div class="col-md-2 d-flex gap-2">
            <button class="btn btn-outline-primary" onclick="setGrid()">
                Grid
            </button>

            <button class="btn btn-outline-primary" onclick="setList()">
                List
            </button>
        </div>

    </div>

    <div id="products" class="row g-3"></div>

</div>

<div class="modal fade" id="detailModal">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 id="modalTitle"></h5>

                <button
                    class="btn-close"
                    data-bs-dismiss="modal">
                </button>
            </div>

            <div class="modal-body" id="modalBody"></div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/app.js"></script>

</body>
</html>
